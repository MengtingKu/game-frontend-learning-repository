name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build collect-stars
        working-directory: projects/collect-stars
        run: |
          npm ci
          npm run build

      - name: Build big-two
        working-directory: projects/big-two
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html dashboard.css _site/
          sed -i 's#http://localhost:5173#./collect-stars/#' _site/index.html
          sed -i 's#http://localhost:5174#./big-two/#' _site/index.html
          cp -r projects/collect-stars/dist _site/collect-stars
          cp -r projects/big-two/dist _site/big-two

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
